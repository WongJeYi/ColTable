- name: install-gtest
  uses: dvd0bvb/install-gtest@v1
  with:
    # Latest stable version is often 1.14.0 or 1.15.0
    gtest_version: "1.14.0" 
    # Standard for Ubuntu 22.04/24.04 runners is typically version 15 or 18
    libcxx_version: "15"
    # Set to 'true' only if you are running MemorySanitizer tests
    msan: false
