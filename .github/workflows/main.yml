            - name: install-gtest
  # You may pin to the exact commit or the version.
  # uses: dvd0bvb/install-gtest@3840e526c42196ce19ebfa96deaf520ba136866f
  uses: dvd0bvb/install-gtest@v1
  with:
    # Version of gtest to install
    gtest_version: 1.12.1
    # Version of libc++ that is already installed
    libcxx_version: "17"
    # Install binaries instrumented with memory sanitization
    msan: # optional
          
