name: GTest CI

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install GitHub CLI
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      # 3. Authenticate GitHub CLI
      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "${GH_TOKEN}" | gh auth login --with-token

      # 4. Download and install GTest package
      - name: Download and Install GTest (MSAN)
        run: |
          gh release download v1.12.1 \
            --repo google/googletest \
            --pattern "googletest-1.12.1-libcxx-17-msan.deb"
          sudo dpkg -i googletest-1.12.1-libcxx-17-msan.deb

      # 5. Build and Test via run.sh
      - name: Build and Test via run.sh
        run: |
          chmod +x run.sh
          ./run.sh
