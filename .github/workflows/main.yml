name: GTest CI

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your repository code so the runner has access to run.sh
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Safely download and install GTest (replaces the failing wget command)
      - name: Download and Install GTest (MSAN)
        env:
          # Automatically uses GitHub's built-in token to prevent API rate limits
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use GitHub CLI to download the exact package bypassing the need for jq/wget
          wget https://github.com
          sudo dpkg -i googletest-1.12.1-libcxx-17-msan.deb

      # 3. Make the script executable and run your build/tests
      - name: Build and Test via run.sh
        run: |
          chmod +x run.sh
          ./run.sh
